# nginx.conf
#
# Reverse proxy configuration for SaveRateLK on the production VPS.
# Maps the public subdomain to the Next.js app running locally on port 3000,
# and redirects all plain HTTP traffic to HTTPS.
#
# Install: copy this file to /etc/nginx/sites-available/saveratelk.conf,
# symlink it into sites-enabled, then run `certbot --nginx` (see README)
# to obtain and wire in the Let's Encrypt certificate before first use.
# Certbot rewrites the HTTPS server block below with the correct
# ssl_certificate paths; the placeholders here are only a starting point.

server {
    listen 80;
    listen [::]:80;
    server_name rates.saveratelk.cloud;

    # Allow Let's Encrypt's HTTP-01 challenge to complete before HTTPS exists.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name rates.saveratelk.cloud;

    # Replaced automatically by `certbot --nginx`; placeholders until then.
    ssl_certificate     /etc/letsencrypt/live/rates.saveratelk.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rates.saveratelk.cloud/privkey.pem;

    access_log /var/log/nginx/saveratelk.access.log;
    error_log  /var/log/nginx/saveratelk.error.log;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
